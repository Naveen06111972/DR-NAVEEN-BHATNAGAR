      <p>Prof. (Dr.) Naveen Bhatnagar is a distinguished academician with over <strong>25 years</strong> of experience in Industry &amp; Education. He has worked as Associate Dean SOET, Associate Director DCPD at Chandigarh University, and Director/Manager across various Universities, Colleges and Corporate organisations. He is associated with <strong>AIMA</strong> (All India Management Association, New Delhi) as Expert/Observer/SME, <strong>SPJIMR</strong> (S.P. Jain Institute of Management &amp; Research) as a member of their Expert Panel since May 2023, and <strong>NIRA</strong> (No Droit Indian Robotics Assistant, Bangalore) as a member of their expert panel.</p>

      <p>Presently associated with <strong>Torah Learning Solutions</strong> as Senior Manager Training, imparting Trainings/Placement in Galgotia University, Greater Noida since September 2025. Core expertise spans AI/ML/Deep Learning, Business Analytics, Campus Recruitment Training, Curriculum Development, and Institutional Building.</p>
